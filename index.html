<!DOCTYPE html>
<html>
<head>
    <title>My CI/CD App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            margin-top: 100px;
        }
        h1 {
            font-size: 50px;
        }
        p {
            font-size: 20px;
        }
        .box {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>🚀 CI/CD Pipeline Working!</h1>
        <p>Deployed using Jenkins + Docker + Kubernetes + ArgoCD</p>
        <p id="time"></p>
    </div>

    <script>
        document.getElementById("time").innerHTML =
            "Last updated: " + new Date().toLocaleString();
    </script>

</body>
</html>
